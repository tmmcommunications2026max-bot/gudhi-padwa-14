<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gudhi Padwa 2026 – Triveni Mitra Mandal</title>

<meta property="og:image" content="https://tmmcommunications2026max-bot.github.io/gudhi-padwa-14/gudhi-padwa-thumbnail-14.jpg">
<meta property="og:image:secure_url" content="https://tmmcommunications2026max-bot.github.io/gudhi-padwa-14/gudhi-padwa-thumbnail-14.jpg">
<meta property="og:image:type" content="image/jpeg">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /*
      Color opposite/complement of #F7747C (coral-pink):
      R: 255-247=8  G: 255-116=139  B: 255-124=131
      → raw complement ≈ #088B83 → lifted to a vivid teal #08B087
      Panel uses a refined deep teal derived from that complement.
    */
    --panel-bg:       #D6F5F0;       /* light mint teal — complementary anchor */
    --panel-bg-mid:   #C0EDE6;       /* slightly deeper mint for gradient      */
    --panel-border:   #0A9E86;       /* rich teal accent border                */

    --teal-hi:        #0A9E86;
    --teal-light:     #065E52;
    --teal-muted:     #1A7A68;

    /* Button palette tuned to read on teal */
    --btn-gold-from:  #E8930A;
    --btn-gold-to:    #C27000;
    --btn-gold-bdr:   #F5C860;

    --btn-coral-from: #E84848;
    --btn-coral-to:   #A81C1C;
    --btn-coral-bdr:  rgba(255,170,170,0.55);

    --btn-navy-from:  #1A3A8C;
    --btn-navy-to:    #0E2260;
    --btn-navy-bdr:   rgba(130,170,255,0.45);

    --text-bright:    #053D34;
    --text-muted:     #1A7A68;
  }

  html, body {
    width: 100%;
    min-height: 100%;
    font-family: 'Cinzel', serif;
  }

  body {
    background: #E8F9F6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: clamp(0px, 2vw, 32px) 0;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 10%, rgba(13,201,168,0.10) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(8,176,135,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 0 0 1.5px rgba(13, 201, 168, 0.50),
      0 0 40px rgba(8, 176, 135, 0.18),
      0 30px 90px rgba(0, 0, 0, 0.45);
  }

  .poster-img {
    display: block;
    width: 100%;
    height: auto;
    object-fit: contain;
  }

  /* ── PANEL: deep teal — complement of #F7747C ── */
  .btn-panel {
    background: linear-gradient(180deg, var(--panel-bg) 0%, var(--panel-bg-mid) 100%);
    border-top: 3px solid var(--panel-border);
    padding: clamp(18px, 4vw, 28px) clamp(18px, 5vw, 36px) clamp(22px, 5vw, 32px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(12px, 2.5vw, 16px);
    opacity: 0;
    transform: translateY(20px);
    animation: slideUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    animation-play-state: paused;
  }
  .btn-panel.visible { animation-play-state: running; }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .divider-line {
    flex: 1;
    height: 1.5px;
    background: linear-gradient(to right, transparent, var(--teal-hi), transparent);
  }
  .divider-gem {
    color: var(--teal-hi);
    font-size: clamp(9px, 2vw, 12px);
    letter-spacing: 8px;
    line-height: 1;
  }

  /* ── Event time box ── */
  .event-time {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 100%;
    background: rgba(13, 201, 168, 0.10);
    border: 1.5px solid rgba(13, 201, 168, 0.35);
    border-radius: 7px;
    padding: clamp(9px, 2.2vw, 13px) 14px;
  }
  .event-time .time-title {
    font-size: clamp(10px, 2.3vw, 13px);
    font-weight: 700;
    color: var(--teal-muted);
    letter-spacing: clamp(0.3px, 0.25vw, 1px);
    text-align: center;
    line-height: 1.3;
  }
  .event-time .time-row {
    font-size: clamp(13px, 3vw, 17px);
    font-weight: 900;
    color: var(--teal-light);
    letter-spacing: clamp(0.5px, 0.3vw, 1.2px);
    white-space: nowrap;
  }

  /* ── Early bird banner ── */
  .early-bird {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 100%;
    font-size: clamp(11px, 2.5vw, 13.5px);
    font-weight: 900;
    color: var(--teal-light);
    letter-spacing: clamp(0.4px, 0.25vw, 1px);
    text-align: center;
    background: rgba(13, 201, 168, 0.12);
    border: 1.5px solid rgba(13, 201, 168, 0.38);
    border-radius: 7px;
    padding: clamp(8px, 2vw, 11px) 14px;
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(13,201,168,0.0); }
    50%       { box-shadow: 0 0 0 5px rgba(13,201,168,0.18); }
  }

  .cta-row {
    display: flex;
    flex-direction: column;
    gap: clamp(10px, 2.2vw, 13px);
    width: 100%;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    font-family: 'Cinzel', serif;
    font-weight: 900;
    text-decoration: none;
    border-radius: 8px;
    cursor: pointer;
    text-transform: uppercase;
    width: 100%;
    color: #fff;
    font-size: clamp(11.5px, 2.6vw, 14px);
    letter-spacing: clamp(1px, 0.4vw, 2px);
    padding: clamp(13px, 3.2vw, 16px) 18px;
    position: relative;
    overflow: hidden;
    text-shadow: 0 1px 4px rgba(0,0,0,0.45);
    transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
  }
  .btn::after {
    content: '';
    position: absolute;
    top: 0; left: -120%;
    width: 60%;
    height: 100%;
    background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.22) 50%, transparent 100%);
    transition: left 0.55s ease;
  }
  .btn:hover::after { left: 170%; }
  .btn:hover  { transform: translateY(-2px); filter: brightness(1.10); }
  .btn:active { transform: scale(0.97); }

  /* Tickets — warm golden amber (warm vs cool teal) */
  .btn-tickets {
    background: linear-gradient(135deg, var(--btn-gold-from) 0%, var(--btn-gold-to) 50%, var(--btn-gold-from) 100%);
    border: 2px solid var(--btn-gold-bdr);
    box-shadow: 0 4px 18px rgba(200, 110, 0, 0.45), inset 0 1px 0 rgba(255,255,255,0.20);
  }
  .btn-tickets:hover { box-shadow: 0 8px 28px rgba(200, 110, 0, 0.65), inset 0 1px 0 rgba(255,255,255,0.20); }

  /* Member — vivid coral (echoes the source #F7747C, bold on teal) */
  .btn-member {
    background: linear-gradient(135deg, var(--btn-coral-from) 0%, var(--btn-coral-to) 50%, var(--btn-coral-from) 100%);
    border: 2px solid var(--btn-coral-bdr);
    box-shadow: 0 4px 18px rgba(200, 40, 40, 0.42), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .btn-member:hover { box-shadow: 0 8px 28px rgba(200, 40, 40, 0.62), inset 0 1px 0 rgba(255,255,255,0.15); }

  /* Volunteer — deep navy/indigo (third complementary on teal) */
  .btn-volunteer {
    background: linear-gradient(135deg, var(--btn-navy-from) 0%, var(--btn-navy-to) 50%, var(--btn-navy-from) 100%);
    border: 2px solid var(--btn-navy-bdr);
    box-shadow: 0 4px 18px rgba(20, 50, 140, 0.42), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .btn-volunteer:hover { box-shadow: 0 8px 28px rgba(20, 50, 140, 0.62), inset 0 1px 0 rgba(255,255,255,0.15); }

  .contact-note {
    font-size: clamp(8.5px, 1.85vw, 11px);
    color: var(--teal-muted);
    letter-spacing: 0.4px;
    text-align: center;
    line-height: 1.7;
    font-weight: 600;
    opacity: 0.92;
  }
  .contact-note a {
    color: var(--teal-light);
    text-decoration: none;
    font-weight: 900;
  }
  .contact-note a:hover { text-decoration: underline; }

  .footer-note {
    font-size: clamp(8.5px, 1.8vw, 10.5px);
    color: var(--teal-hi);
    letter-spacing: 0.6px;
    text-align: center;
    line-height: 1.65;
    font-weight: 700;
    opacity: 0.85;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 499px) {
    body {
      padding: 0;
      background: #E8F9F6;
      justify-content: flex-start;
    }
    .card {
      max-width: 100%;
      border-radius: 0;
      box-shadow: none;
    }
  }
</style>
</head>
<body>

<div class="card">

  <img class="poster-img"
       id="flyer"
       src="https://tmmcommunications2026max-bot.github.io/gudhi-padwa-14/gudhi-padwa-flyer-14.jpg?v=2"
       alt="Gudhi Padwa & Maharashtra Din Celebration 2026"
       loading="eager"
       decoding="async">

  <div class="btn-panel" id="btnPanel">

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-gem">✦ ✦ ✦</div>
      <div class="divider-line"></div>
    </div>

    <div class="event-time">
      <span class="time-title">🕥 &nbsp;Gudhi Padwa & Maharashtra Din</span>
      <span class="time-row">11:30 AM – 5:00 PM</span>
    </div>


    <div class="cta-row">
      <a href="https://www.triveni-mandal.org/event-details/gudhi-padwa-2026"
         class="btn btn-tickets"
         target="_blank" rel="noopener noreferrer">
        🎟️&nbsp;&nbsp;Buy Tickets
      </a>
      <a href="https://www.triveni-mandal.org/plans-pricing"
         class="btn btn-member"
         target="_blank" rel="noopener noreferrer">
        ⭐&nbsp;&nbsp;Become a Member
      </a>
      <a href="https://www.triveni-mandal.org/gudhi-padwa-2025-volunteering-form"
         class="btn btn-volunteer"
         target="_blank" rel="noopener noreferrer">
        🙌&nbsp;&nbsp;Sign Up to Volunteer
      </a>
    </div>

    <div class="contact-note">
      📞 For any ticketing issues, please contact Rohit at <a href="tel:5134458029">513-445-8029</a>
    </div>

    <div class="footer-note">★ Members enjoy discounted tickets &nbsp;|&nbsp; Volunteers are appreciated — Join us!</div>

  </div>
</div>

<script>
  const flyer = document.getElementById('flyer');
  const panel = document.getElementById('btnPanel');
  function reveal() { panel.classList.add('visible'); }
  if (flyer.complete && flyer.naturalWidth > 0) reveal();
  else {
    flyer.addEventListener('load',  reveal);
    flyer.addEventListener('error', reveal);
  }
</script>

</body>
</html>
